<router-outlet></router-outlet>

<mat-form-field appearance="outline" class="filter-field">
  <mat-label>Buscar habitación</mat-label>
  <mat-icon matPrefix>search</mat-icon>
  <input matInput (keyup)="applyFilter($event)" placeholder="Número, tipo..." #input>
</mat-form-field>

<div class="mat-elevation-z8">
  <table mat-table [dataSource]="$dataSource()" matSort>

    <ng-container matColumnDef="idRoom">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>ID</th>
      <td mat-cell *matCellDef="let row">{{ row.idRoom }}</td>
    </ng-container>

    <ng-container matColumnDef="numberDto">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>NÚMERO</th>
      <td mat-cell *matCellDef="let row">{{ row.numberDto }}</td>
    </ng-container>

    <ng-container matColumnDef="typeDto">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>TIPO</th>
      <td mat-cell *matCellDef="let row">{{ row.typeDto }}</td>
    </ng-container>

    <ng-container matColumnDef="priceDto">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>PRECIO/NOCHE</th>
      <td mat-cell *matCellDef="let row">{{ row.priceDto | currency }}</td>
    </ng-container>

    <ng-container matColumnDef="availableDto">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>DISPONIBILIDAD</th>
      <td mat-cell *matCellDef="let row">
        <span class="badge" [class.badge-available]="row.availableDto" [class.badge-occupied]="!row.availableDto">
          {{ row.availableDto ? 'Disponible' : 'Ocupada' }}
        </span>
      </td>
    </ng-container>

    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef>ACCIONES</th>
      <td mat-cell *matCellDef="let row">
        <button mat-icon-button title="Editar" [routerLink]="['edit', row.idRoom]">
          <mat-icon>edit</mat-icon>
        </button>
        <button mat-icon-button
          [title]="row.availableDto ? 'Marcar como Ocupada' : 'Marcar como Disponible'"
          [color]="row.availableDto ? 'warn' : 'primary'"
          (click)="toggleAvailability(row)">
          <mat-icon>{{ row.availableDto ? 'do_not_disturb' : 'check_circle' }}</mat-icon>
        </button>
        <button mat-icon-button color="warn" title="Eliminar" (click)="delete(row.idRoom)">
          <mat-icon>delete</mat-icon>
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

    <tr class="mat-row" *matNoDataRow>
      <td class="mat-cell" colspan="6">No hay habitaciones que coincidan con "{{ input.value }}"</td>
    </tr>
  </table>

  <mat-paginator [pageSizeOptions]="[5, 10, 25, 100]" aria-label="Páginas de habitaciones"></mat-paginator>

  <div class="fab-container">
    <button mat-fab color="primary" routerLink="new" title="Nueva Habitación">
      <mat-icon>add</mat-icon>
    </button>
  </div>
</div>
